version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ghboard
    binary: ghboard
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - "-s -w"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: ghboard
    builds:
      - ghboard
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: Null-Phnix
    name: ghboard
  use_existing_draft: true
  replace_existing_draft: true
  prerelease: auto

brews:
  - name: ghboard
    repository:
      owner: Null-Phnix
      name: homebrew-tap
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/Null-Phnix/ghboard"
    description: "Terminal dashboard for GitHub: heatmap, stars, and notifications in one TUI."
    license: "MIT"
    skip_upload: true

changelog:
  sort: asc
  use: github
  groups:
    - title: "New Features"
      regexp: '^feat(\(.+\))?\!?:'
      order: 0
    - title: "Bug Fixes"
      regexp: '^fix(\(.+\))?\!?:'
      order: 1
    - title: "Documentation"
      regexp: '^docs(\(.+\))?\!?:'
      order: 2
    - title: "Other Changes"
      regexp: '^chore(\(.+\))?\!?:'
      order: 3
    - title: "Remaining Changes"
      order: 999
  filters:
    exclude:
      - "^Merge pull request"
      - "^Merge branch"
